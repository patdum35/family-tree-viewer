<script>
// =====================================================
// IMPORTANT : Déclarations globales pour Cordova
// =====================================================
let TTS;
let SpeechRecognition;
let recognition;
const isCapacitor = !!window.Capacitor;

// =====================================================
// Fonction de logging
// =====================================================
function log(msg, type = 'info') {
    console.log('[' + type.toUpperCase() + '] ' + msg);
    const logDiv = document.getElementById('log');
    const timestamp = new Date().toLocaleTimeString();
    logDiv.innerHTML = `[${timestamp}] ${msg}<br>` + logDiv.innerHTML;
}

function updateStatus(msg, statusType) {
    const statusDiv = document.getElementById('status');
    statusDiv.className = 'status ' + statusType;
    statusDiv.textContent = msg;
    log(msg, statusType);
}

// =====================================================
// TTS Functions
// =====================================================
async function populateVoices() {
    log('🔍 Chargement des voix TTS...');
    const voicesSelect = document.getElementById('voices');
    voicesSelect.innerHTML = '';
    
    if (!isCapacitor && window.speechSynthesis) {
        // Web Speech API
        log('📱 Mode WEB : Utilisation de speechSynthesis');
        const voices = window.speechSynthesis.getVoices();
        if (voices.length === 0) {
            log('⚠️ Aucune voix trouvée, réessai dans 100ms...');
            setTimeout(populateVoices, 100);
            return;
        }
        voices.forEach(v => {
            const opt = document.createElement('option');
            opt.value = v.name;
            opt.textContent = `${v.name} (${v.lang})`;
            voicesSelect.appendChild(opt);
        });
        log('✅ ' + voices.length + ' voix chargées (Web)');
    } else if (isCapacitor && TTS) {
        // Capacitor TTS
        log('📱 Mode CAPACITOR : Utilisation de cordova-plugin-tts');
        try {
            // Certains plugins TTS ont une méthode getVoices
            if (typeof TTS.getVoices === 'function') {
                const voices = await TTS.getVoices();
                voices.forEach(v => {
                    const opt = document.createElement('option');
                    opt.value = v.identifier || v.name;
                    opt.textContent = `${v.name} (${v.language})`;
                    voicesSelect.appendChild(opt);
                });
                log('✅ ' + voices.length + ' voix chargées (Capacitor)');
            } else {
                // Voix par défaut si getVoices n'existe pas
                const opt = document.createElement('option');
                opt.value = 'fr-FR';
                opt.textContent = 'Voix par défaut (Android TTS)';
                voicesSelect.appendChild(opt);
                log('✅ Voix par défaut configurée');
            }
        } catch (err) {
            log('❌ Erreur chargement voix: ' + err.message, 'error');
            const opt = document.createElement('option');
            opt.value = 'fr-FR';
            opt.textContent = 'Voix par défaut (Android TTS)';
            voicesSelect.appendChild(opt);
        }
    } else {
        log('❌ Aucun système TTS disponible', 'error');
        const opt = document.createElement('option');
        opt.value = '';
        opt.textContent = 'TTS non disponible';
        voicesSelect.appendChild(opt);
    }
}

function speakText() {
    const text = document.getElementById('ttsText').value;
    const voiceName = document.getElementById('voices').value;

    if (!text) {
        log('⚠️ Aucun texte à lire', 'warning');
        return;
    }

    log('🔊 Lecture TTS : "' + text + '"');

    if (!isCapacitor && window.speechSynthesis) {
        // Web Speech Synthesis
        log('📱 TTS Web : démarrage...');
        const utter = new SpeechSynthesisUtterance(text);
        const voices = window.speechSynthesis.getVoices();
        if (voiceName) {
            const selectedVoice = voices.find(v => v.name === voiceName);
            if (selectedVoice) {
                utter.voice = selectedVoice;
                log('🎙️ Voix sélectionnée : ' + selectedVoice.name);
            }
        }
        utter.onend = () => log('✅ TTS terminée');
        utter.onerror = (e) => log('❌ Erreur TTS: ' + e.error, 'error');
        window.speechSynthesis.speak(utter);

        // Capacitor TTS
        log('📱 TTS Capacitor : démarrage...');
        const options = { 
            text: text, 
            locale: voiceName || 'fr-FR', 
            rate: 1.0 
        };
        
        TTS.speak(options)
           .then(() => {
               log('✅ TTS Capacitor : succès');
               updateStatus('✅ TTS terminée avec succès', 'ok');
           })
           .catch(err => {
               log('❌ Erreur TTS Capacitor: ' + err, 'error');
               updateStatus('❌ Erreur TTS : ' + err, 'error');
           });
    } else {
        log('❌ TTS non disponible', 'error');
        updateStatus('❌ TTS non disponible', 'error');
    }
}

// =====================================================
// STT Functions
// =====================================================
function initWebSTT() {
    if (window.SpeechRecognition || window.webkitSpeechRecognition) {
        const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognitionAPI();
        recognition.lang = 'fr-FR';
        recognition.continuous = true;
        recognition.interimResults = true;

        recognition.onresult = (event) => {
            let transcript = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                transcript += event.results[i][0].transcript;
            }
            document.getElementById('sttResult').textContent = transcript;
            log('🎤 STT Web : ' + transcript);

        recognition.onstart = () => {
            log('🎤 STT Web : démarrée');
            updateStatus('🎤 STT en cours...', 'ok');
        };
        
        recognition.onend = () => {
            log('🎤 STT Web : arrêtée');
            updateStatus('⏹️ STT arrêtée', 'warning');
        };
        
        recognition.onerror = (event) => {
            log('❌ Erreur STT Web: ' + event.error, 'error');
            updateStatus('❌ Erreur STT : ' + event.error, 'error');
        };
        
        log('✅ STT Web initialisée');
        return true;
    }
    return false;
}

function startSTT() {
    log('▶️ Démarrage STT...');
    
    if (!isCapacitor && recognition) {
        // Web Speech Recognition
        try {
            recognition.start();
            log('✅ STT Web démarrée');
        } catch (e) {
            log('❌ Erreur démarrage STT Web: ' + e.message, 'error');
        }

    } else if (isCapacitor && SpeechRecognition) {

        log("📱 STT Capacitor : demande permission...");

        SpeechRecognition.requestPermission()
            .then(() => {

                log("🔄 Permissions OK, démarrage écoute...");

                SpeechRecognition.startListening(
                    function(matches) {
                        const txt = Array.isArray(matches) ? matches.join(' ') : matches;
                        document.getElementById('sttResult').textContent = txt;
                        log("🎤 STT : " + txt);
                        updateStatus("🎤 STT reçue", "ok");
                    },
                    function(err) {
                        log("❌ STT Erreur : " + err, "error");
                        updateStatus("❌ STT Erreur : " + err, "error");
                    },
                    {
                        language: "fr-FR",
                        matches: 1,
                        showPartial: true,
                        showPopup: true
                    }
                );
            })
            .catch(err => {
                log("❌ Permission refusée : " + err, "error");
                updateStatus("❌ Permission STT refusée", "error");
            });




    } else {
        log('❌ STT non disponible', 'error');
        updateStatus('❌ STT non disponible', 'error');
    }













    
}

function stopSTT() {
    log('⏹️ Arrêt STT...');
    
    if (!isCapacitor && recognition) {
        try {
            recognition.stop();
            log('✅ STT Web arrêtée');
        } catch (e) {
            log('❌ Erreur arrêt STT Web: ' + e.message, 'error');
        }
    } else if (isCapacitor && SpeechRecognition) {
        SpeechRecognition.stopListening()
            .then(() => {
                log('✅ STT Capacitor arrêtée');
                updateStatus('⏹️ STT arrêtée', 'warning');
            })
            .catch(err => {
                log('❌ Erreur arrêt STT Capacitor: ' + err, 'error');
            });
    }
}

// =====================================================
// Event Listeners
// =====================================================
document.getElementById('speakBtn').addEventListener('click', speakText);
document.getElementById('startSTT').addEventListener('click', startSTT);
document.getElementById('stopSTT').addEventListener('click', stopSTT);

// =====================================================
// INITIALISATION PRINCIPALE
// =====================================================
function initApp() {
    log('🚀 Initialisation de l\'application...');
    log('📱 Mode : ' + (isCapacitor ? 'CAPACITOR' : 'WEB'));
    
    if (isCapacitor) {
        log('⏳ Attente de l\'événement deviceready...');
    } else {
        log('🌐 Mode Web détecté, initialisation immédiate');
        
        // Init Web STT
        if (initWebSTT()) {
            updateStatus('✅ STT Web initialisée', 'ok');
        } else {
            updateStatus('⚠️ STT Web non supportée', 'warning');
        }
        
        // Init Web TTS
        if (window.speechSynthesis) {
            window.speechSynthesis.onvoiceschanged = populateVoices;
            populateVoices();
            updateStatus('✅ TTS Web initialisée', 'ok');
        } else {
            updateStatus('⚠️ TTS Web non supportée', 'warning');
        }
    }
}

// =====================================================
// Event deviceready pour Capacitor/Cordova
// =====================================================
document.addEventListener('deviceready', function() {
    log('✅ deviceready événement reçu !');
    
    // ACCÈS AUX PLUGINS VIA window GLOBAL
    // Les plugins Cordova sont exposés sur window après deviceready
    
    // TTS Plugin
    if (window.TTS) {
        TTS = window.TTS;
        log('✅ Plugin TTS trouvé sur window.TTS');
        populateVoices();
    } else if (window.plugins && window.plugins.tts) {
        TTS = window.plugins.tts;
        log('✅ Plugin TTS trouvé sur window.plugins.tts');
        populateVoices();
    } else {
        log('❌ Plugin TTS NON TROUVÉ sur window', 'error');
        log('💡 Vérifiez que cordova-plugin-tts est bien installé', 'warning');
    }
    
    // Speech Recognition Plugin
    if (window.plugins && window.plugins.speechRecognition) {
        SpeechRecognition = window.plugins.speechRecognition;
        log('✅ Plugin SpeechRecognition trouvé');
        
        // Vérifier disponibilité
        SpeechRecognition.isRecognitionAvailable(
            function(available) {
                if (available) {
                    log('✅ STT disponible sur cet appareil');
                    updateStatus('✅ Plugins initialisés', 'ok');
                } else {
                    log('⚠️ STT non disponible sur cet appareil', 'warning');
                    updateStatus('⚠️ STT non disponible', 'warning');
                }
            },
            function(err) {
                log('❌ Erreur vérification STT: ' + err, 'error');
            }
        );
    } else {
        log('❌ Plugin SpeechRecognition NON TROUVÉ', 'error');
        log('💡 Vérifiez que cordova-plugin-speechrecognition est installé', 'warning');
    }
    
    // Log de tous les plugins disponibles
    if (window.plugins) {
        log('📦 Plugins disponibles : ' + Object.keys(window.plugins).join(', '));
    }
    
}, false);

// Initialisation au chargement
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initApp);
} else {
    initApp();
}
</script>
</body>
</html>

        recognition = new SpeechRecognitionAPI();
        recognition.lang = 'fr-FR';
        
        // CONFIGURATION CRITIQUE pour mobile
        if (isMobile) {
            // Sur mobile, continuous=true peut bugger, on utilise une approche hybride
            recognition.continuous = false;  // On laisse à false pour éviter les bugs
            recognition.interimResults = true;
            
            log('📱 Mode mobile détecté - configuration spéciale activée');
        } else {
            // Sur PC, continuous=true marche bien
            recognition.continuous = true;
            recognition.interimResults = true;
        }

        // Gestion des résultats
        recognition.onresult = (event) => {
            let transcript = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    transcript += event.results[i][0].transcript;
                } else {
                    // Résultats intermédiaires
                    transcript += event.results[i][0].transcript;
                }
            }
            
            if (transcript.trim()) {
                const currentText = document.getElementById('sttResult').textContent;
                document.getElementById('sttResult').textContent = currentText + ' ' + transcript;
                log('🎤 STT : ' + transcript);
                
                // Réinitialiser le compteur de redémarrages quand on a du texte
                consecutiveRestarts = 0;
            }
        };
        
        recognition.onstart = () => {
            log('🎤 STT démarrée');
            updateStatus('🎤 STT en cours...', 'ok');
            lastRestartTime = Date.now();
        };
        
        // =====================================================
        // HACK PRINCIPAL : Gestion intelligente de onend
        // =====================================================
        recognition.onend = () => {
            const now = Date.now();
            const timeSinceRestart = now - lastRestartTime;
            
            log(`🔄 STT arrêtée (depuis ${timeSinceRestart}ms)`);
            
            if (isRecording) {
                consecutiveRestarts++;
                
                // Calcul du délai dynamique
                let restartDelay = calculateDynamicRestartDelay();
                
                // Si c'était très court (< 500ms), c'est probablement un bug mobile
                if (timeSinceRestart < 500 && consecutiveRestarts < 5) {
                    restartDelay = Math.min(restartDelay, 50); // Redémarrage ultra-rapide
                    log(`⚡ Redémarrage rapide (bug mobile détecté): ${restartDelay}ms`);
                }
                
                // Nettoyer tout timeout existant
                if (restartTimeout) {
                    clearTimeout(restartTimeout);
                }
                
                // Redémarrer avec le délai calculé
                restartTimeout = setTimeout(() => {
                    if (isRecording) {
                        try {
                            recognition.start();
                            log(`✅ Redémarré après ${restartDelay}ms (tentative ${consecutiveRestarts})`);
                        } catch (e) {
                            if (e.message.includes('already started') || e.name === 'InvalidStateError') {
                                // C'est bon, ça tourne déjà
                                log('⚠️ Déjà démarré, c\'est normal');
                            } else {
                                log('❌ Erreur redémarrage: ' + e.message, 'error');
                                // Réessayer avec un délai plus long
                                setTimeout(() => {
                                    if (isRecording) {
                                        try { recognition.start(); } catch(e2) {}
                                    }
                                }, 500);
                            }
                        }
                    }
                }, restartDelay);
            } else {
                updateStatus('⏹️ STT arrêtée', 'warning');
            }
        };
        
        recognition.onerror = (event) => {
            // Ignorer certaines erreurs "normales" sur mobile
            if (event.error === 'no-speech' || event.error === 'audio-capture') {
                log('⚠️ ' + event.error + ' (normal sur mobile)', 'warning');

            } else if (event.error === 'network') {

                        try { recognition.start(); } catch(e) {}

function calculateDynamicRestartDelay() {
    // Base delay
    let delay = 100; // 100ms de base
    
    // Ajustement pour mobile
    if (isMobile) {
        delay = 50; // Plus rapide sur mobile

            try {
                recognition.start();
                log('🚀 STT démarrée (contexte audio actif)');
            } catch (e) {
                log('❌ Erreur démarrage: ' + e.message, 'error');
                isRecording = false;
            }
        }
    }, 200); // Délai pour stabiliser l'audio
}

// =====================================================
// ARRÊT OPTIMISÉ - HACK PRINCIPAL
// =====================================================
function stopSTT() {
    log('⏹️ Arrêt STT avec prévention DOUBLE-BIP...');
    
    // HACK : Marquer comme "soft stop" pour éviter onend
    isSoftStopping = true;
    
    // HACK : Arrêter GRADUELLEMENT
    setTimeout(() => {
        isRecording = false;
        
        if (recognition) {
            try {
                // 1. D'abord, mettre interimResults à false
                recognition.interimResults = false;
                
                // 2. Attendre un peu
                setTimeout(() => {
                    try {
                        // 3. Arrêter proprement
                        recognition.stop();
                        
                        // 4. Réinitialiser pour la prochaine fois
                        setTimeout(() => {
                            initWebSTT();
                            log('🔄 Instance réinitialisée (prête pour prochain démarrage)');
                        }, 100);
                        
                        log('✅ STT arrêtée (sans double-bip)');
                        updateStatus('⏹️ STT arrêtée', 'warning');
                        
                    } catch (e) {
                        // Ignorer
                    }
                }, 50);
                
            } catch (e) {
                log('⚠️ Erreur lors de l\'arrêt graduel: ' + e.message);
            }
        }
    }, 10);
}

// =====================================================
// Event Listeners
// =====================================================
document.getElementById('speakBtn').addEventListener('click', speakText);
document.getElementById('startSTT').addEventListener('click', startSTT);
document.getElementById('stopSTT').addEventListener('click', stopSTT);

// =====================================================
// INITIALISATION
// =====================================================
async function initApp() {
    log('🚀 Initialisation avec hacks anti-double-bip...');
    log('📱 Mobile: ' + isMobile);
    log('🌐 Navigateur: ' + navigator.userAgent.substring(0, 60));
    
    // Initialiser le contexte audio en PREMIER
    await initAudioContext();
    
    // Initialiser STT
    if (initWebSTT()) {
        updateStatus('✅ STT initialisée (anti-bip activé)', 'ok');
    }
    
    // Initialiser TTS
    if (window.speechSynthesis) {
        window.speechSynthesis.onvoiceschanged = populateVoices;
        setTimeout(populateVoices, 100);
        log('✅ TTS initialisée');
    }
    
    // Forcer l'activation audio au premier clic
    document.body.addEventListener('click', async () => {
        if (audioContext && audioContext.state === 'suspended') {
            await audioContext.resume();
            log('🎵 AudioContext réactivé par clic');
        }
    }, { once: true });
}

// Démarrer
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initApp);
} else {
    initApp();
}

// =====================================================
// HACK FINAL : Garder l'audio actif pendant la session
// =====================================================
let activityTimer;
function resetActivityTimer() {
    clearTimeout(activityTimer);
    activityTimer = setTimeout(() => {
        // Tous les 30 secondes, jouer un son silencieux
        // pour garder le contexte audio actif
        if (isAudioContextReady) {
            try {
                const silentAudio = document.getElementById('silentAudio');
                if (silentAudio.paused) {
                    silentAudio.play().catch(() => {});
                }
            } catch(e) {}
        }
    }, 30000);
}

// Réinitialiser le timer à chaque interaction
document.addEventListener('click', resetActivityTimer);
document.addEventListener('touchstart', resetActivityTimer);
resetActivityTimer();
</script>
