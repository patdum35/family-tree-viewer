<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonde de Détection Samsung Force Dark</title>
    <style>
        body {
            background-color: #ffffff;
            color: #000000;
            font-family: -apple-system, sans-serif;
            padding: 20px;
            text-align: center;
        }
        #results {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background: #f0f0f0;
            font-family: monospace;
            text-align: left;
            display: inline-block;
        }
        .status {
            font-weight: bold;
            font-size: 1.2em;
            margin: 20px 0;
        }
        /* L'élément sonde : blanc pur, caché mais présent dans le DOM */
        #probe-container {
            position: absolute;
            top: -1000px;
            left: -1000px;
            width: 50px;
            height: 50px;
        }
    </style>
</head>
<body>

    <h1>Diagnostic Samsung Internet</h1>
    
    <div id="probe-container">
        <svg xmlns="http://www.w3.org/2000/svg" width="50" height="50">
            <foreignObject width="50" height="50">
                <div id="target-node" style="background-color: rgb(255, 255, 255); color: rgb(0, 0, 0); width: 50px; height: 50px;">
                    DETECT
                </div>
            </foreignObject>
        </svg>
    </div>

    <div id="status-text" class="status">Analyse du moteur de rendu...</div>
    
    <div id="results"></div>

    <script>
        async function runDiagnostic() {
            const results = document.getElementById('results');
            const statusText = document.getElementById('status-text');
            const target = document.getElementById('target-node');

            // Attendre que le navigateur ait effectué son premier "paint"
            await new Promise(r => setTimeout(r, 300));

            const computedStyle = window.getComputedStyle(target);
            const bgColor = computedStyle.backgroundColor;
            const textColor = computedStyle.color;
            
            // Détection de l'User Agent
            const isSamsung = /SamsungBrowser/i.test(navigator.userAgent);
            // Détection de la préférence système (Standard)
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

            let log = `User Agent: ${navigator.userAgent}\n`;
            log += `Système prefers-dark: ${prefersDark}\n`;
            log += `Couleur calculée (Fond): ${bgColor}\n`;
            log += `Couleur calculée (Texte): ${textColor}\n`;

            results.innerText = log;

            // ANALYSE DU HACK
            // Si le fond calculé est sombre (< 150 sur le canal Red) 
            // alors que nous avons forcé du blanc (255)
            const rValue = parseInt(bgColor.match(/\d+/)[0]);
            const isInverted = rValue < 150;

            if (isSamsung) {
                if (isInverted) {
                    statusText.innerHTML = "❌ MODE SOMBRE FORCÉ DÉTECTÉ<br><small>(Samsung Internet inverse activement vos couleurs)</small>";
                    statusText.style.color = "red";
                } else if (prefersDark) {
                    statusText.innerHTML = "✅ MODE SOMBRE NATIF<br><small>(Le navigateur suit vos Media Queries)</small>";
                    statusText.style.color = "green";
                } else {
                    statusText.innerHTML = "✅ MODE CLAIR NORMAL";
                    statusText.style.color = "blue";
                }
            } else {
                statusText.innerHTML = "Navigateur non-Samsung détecté.";
            }
        }

        window.onload = runDiagnostic;
    </script>
</body>
</html>
